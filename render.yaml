services:
  - type: web
    runtime: node
    name: medusa-app
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm run start
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medusa-db
          property: connectionString
      - key: CLAUDE_CODE_OAUTH_TOKEN
        sync: false
      - key: MEDUSA_OPS_ACCESS_KEY
        sync: false
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

databases:
  - name: medusa-db
    databaseName: medusa
    user: medusa_app
